apiVersion: v1
kind: Service
metadata:
  name: {{ include "kagent-healer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-healer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.webhookPort }}
      targetPort: webhook
      protocol: TCP
      name: webhook
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "kagent-healer.selectorLabels" . | nindent 4 }}
