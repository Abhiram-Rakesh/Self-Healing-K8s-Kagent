{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kagent-healer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-healer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kagent-healer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Alertmanager webhook → port 8000
    - ports:
        - port: {{ .Values.service.webhookPort }}
          protocol: TCP
    # kagent SSE tool calls → MCP port 8080
    - ports:
        - port: {{ .Values.service.mcpPort }}
          protocol: TCP

  egress:
    # DNS — required for K8s service discovery and external hostname resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server, Gemini API, AWS Secrets Manager, CloudWatch (all HTTPS)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
{{- end }}
