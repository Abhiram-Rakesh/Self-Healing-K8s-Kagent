# Production overrides. Apply with:
#   helm upgrade --install kagent-healer helm/kagent-healer/ -f values-prod.yaml ...

replicaCount: 2

image:
  pullPolicy: IfNotPresent

agent:
  dryRun: "false"
  confidenceThreshold: "0.80"
  maxReplicas: "20"
  dailyRequestLimit: "500"
  logLevel: "INFO"

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 1
    memory: 768Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kagent-healer
          topologyKey: kubernetes.io/hostname
