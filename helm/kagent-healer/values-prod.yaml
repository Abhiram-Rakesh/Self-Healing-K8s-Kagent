# Production overrides. Apply with:
#   helm upgrade --install kagent-healer helm/kagent-healer/ -f values-prod.yaml ...

# SQLite does not support concurrent writes from multiple pods sharing the same
# PVC. Keep replicaCount=1 and hpa.enabled=false while persistence is enabled.
# To run multiple replicas, replace RunbookMemory with a shared database backend
# and set persistence.enabled=false.
replicaCount: 1

persistence:
  enabled: true
  size: 2Gi

image:
  pullPolicy: IfNotPresent

agent:
  dryRun: "false"
  confidenceThreshold: "0.80"
  maxReplicas: "20"
  dailyRequestLimit: "500"
  logLevel: "INFO"

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 1
    memory: 768Mi

hpa:
  enabled: false  # disabled — see replicaCount note above

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kagent-healer
          topologyKey: kubernetes.io/hostname
