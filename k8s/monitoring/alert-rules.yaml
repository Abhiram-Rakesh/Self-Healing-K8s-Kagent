apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kagent-healer-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kagent-healer-rules
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: kagent-healer
    release: monitoring
spec:
  groups:
    - name: kagent.healing
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 > 0.5
          for: 1m
          labels:
            severity: critical
            kagent: "true"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 0.5 times per minute over the last 5 minutes."
            pod: "{{ $labels.pod }}"
            namespace: "{{ $labels.namespace }}"
            container: "{{ $labels.container }}"

        - alert: PodOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: critical
            kagent: "true"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was killed by the OOM killer."
            pod: "{{ $labels.pod }}"
            namespace: "{{ $labels.namespace }}"
            container: "{{ $labels.container }}"

        - alert: PodPendingTooLong
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 5m
          labels:
            severity: warning
            kagent: "true"
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck in Pending"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been Pending for more than 5 minutes."
            pod: "{{ $labels.pod }}"
            namespace: "{{ $labels.namespace }}"

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 2m
          labels:
            severity: critical
            kagent: "true"
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node {{ $labels.node }} has been NotReady for more than 2 minutes."
            node: "{{ $labels.node }}"

        - alert: PVCUsageHigh
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 5m
          labels:
            severity: warning
            kagent: "true"
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is above 85% usage"
            description: "Volume {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is at {{ $value | humanizePercentage }} capacity."
            pod: "{{ $labels.pod }}"
            namespace: "{{ $labels.namespace }}"
            persistentvolumeclaim: "{{ $labels.persistentvolumeclaim }}"
