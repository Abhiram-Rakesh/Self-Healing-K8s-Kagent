apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: kagent-healer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kagent-healer
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: kagent-healer
    alertmanagerConfig: kagent
spec:
  route:
    receiver: kagent-webhook
    groupBy:
      - alertname
      - namespace
      - pod
    groupWait: 10s
    groupInterval: 30s
    repeatInterval: 5m
    matchers:
      - name: kagent
        value: "true"
        matchType: "="
    continue: false

  receivers:
    - name: kagent-webhook
      webhookConfigs:
        - url: "http://kagent-healer.kagent.svc.cluster.local:8000/webhook"
          sendResolved: false
          httpConfig:
            followRedirects: true
          maxAlerts: 0
