apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    # kube-prometheus-stack's Grafana sidecar watches this label.
    grafana_datasource: "1"
    app.kubernetes.io/part-of: kagent-healer
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        version: 1
        editable: true
        jsonData:
          maxLines: 1000
