apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-test
  namespace: default
  labels:
    app: crash-test
    app.kubernetes.io/name: crash-test
    app.kubernetes.io/component: test-workload
    app.kubernetes.io/part-of: kagent-healer
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-test
  template:
    metadata:
      labels:
        app: crash-test
        app.kubernetes.io/name: crash-test
        app.kubernetes.io/component: test-workload
    spec:
      restartPolicy: Always
      containers:
        - name: crasher
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'echo "Starting"; sleep 5; echo "Crashing"; exit 1'
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
