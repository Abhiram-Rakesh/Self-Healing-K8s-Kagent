apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-test
  namespace: default
  labels:
    app: oom-test
    app.kubernetes.io/name: oom-test
    app.kubernetes.io/component: test-workload
    app.kubernetes.io/part-of: kagent-healer
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-test
  template:
    metadata:
      labels:
        app: oom-test
        app.kubernetes.io/name: oom-test
        app.kubernetes.io/component: test-workload
    spec:
      restartPolicy: Always
      containers:
        - name: hog
          image: polinux/stress
          command: ["stress"]
          # 150M allocation against a 64Mi limit = guaranteed OOMKill.
          args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
