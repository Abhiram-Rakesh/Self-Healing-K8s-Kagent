name: Terraform

on:
  pull_request:
    paths: ["terraform/**", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yml"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.10.5
  TF_WORKING_DIR: terraform

jobs:
  plan:
    name: terraform plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -out=tfplan -input=false \
            -var "state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var "gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var "slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}" \
            > plan.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          {
            echo "plan<<EOF"
            tail -c 60000 plan.txt
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          TF_IN_AUTOMATION: "true"

      - name: Comment plan on PR
        uses: actions/github-script@v9
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.plan }}`;
            const body = [
              "### Terraform Plan",
              "",
              "```",
              planOutput,
              "```",
            ].join("\n");
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: |
          echo "terraform plan returned ${{ steps.plan.outputs.exit_code }}"
          exit 1

  apply:
    name: terraform apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: terraform apply
        run: |
          terraform apply -auto-approve -input=false \
            -var "state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var "gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var "slack_webhook_url=${{ secrets.SLACK_WEBHOOK_URL }}"
